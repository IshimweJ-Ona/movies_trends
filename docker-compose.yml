
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moviestream-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    networks:
      - moviestream-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /movie_trends/api
        VITE_BASE_PATH: /movie_trends/
    container_name: moviestream-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - moviestream-network

networks:
  moviestream-network:
    driver: bridge

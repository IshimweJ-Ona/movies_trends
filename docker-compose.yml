version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moviestream-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    networks:
      - moviestream-network
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --root-path /api 

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: moviestream-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - moviestream-network
    environment:
      - VITE_API_BASE_URL=/api

networks:
  moviestream-network:
    driver: bridge
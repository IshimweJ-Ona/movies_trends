services:
  - type: web
    name: moviestream-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: TMDB_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://<frontend-service>.onrender.com
    healthCheckPath: /api/genres
    plan: starter

  - type: static
    name: moviestream-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://<backend-service>.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    plan: starter
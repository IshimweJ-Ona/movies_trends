services:
  - type: web_service
    name: moviestream-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: TMDB_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://<frontend-service>.onrender.com
    healthCheckPath: /api/genres
    plan: starter

  - type: static_site
    name: moviestream-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: moviestream-backend
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    plan: starter
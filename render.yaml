services:
  - type: web
    name: moviestream-backend
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: ./backend
    envVars:
      - key: TMDB_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        fromService:
          type: static
          name: moviestream-frontend
          property: host
    healthCheckPath: /api/genres
    plan: starter

  - type: static
    name: moviestream-frontend
    runtime: node
    buildCommand: cd frontend && VITE_API_BASE_URL=$VITE_API_BASE_URL/api npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: moviestream-backend
          property: host
        value: $RENDER_EXTERNAL_URL/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    plan: starter
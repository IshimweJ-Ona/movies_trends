app = "moviestream-frontend"

[build]
  dockerfile = "Dockerfile"

[env]
  VITE_API_BASE_URL = "https://moviestream-backend.fly.dev/api"

[http_service]
  internal_port = 5173
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]